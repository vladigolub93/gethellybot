<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Helly Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/webapp/assets/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-mark">H</div>
        <div class="topbar-copy">
          <p class="eyebrow">Telegram Mini App</p>
          <h1>Helly Dashboard</h1>
        </div>
      </header>
      <section id="app" class="app-root">
        <div class="state-card loading-card">
          <p class="eyebrow">Loading</p>
          <h2>Opening your dashboard</h2>
          <p>Checking Telegram auth and loading the latest recruiting data.</p>
        </div>
      </section>
    </main>
    <script src="/webapp/assets/app.js"></script>
  </body>
  </html>
