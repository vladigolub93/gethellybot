<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#030304" />
    <title>Helly</title>
    <link rel="stylesheet" href="/webapp/assets/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  </head>
  <body>
    <main class="app-shell topbar-hidden">
      <header class="topbar">
        <div class="topbar-copy">
          <h1 class="brand-lockup" aria-label="Helly">
            <span class="brand-angle">&gt;</span><span class="brand-word">helly</span><span class="brand-tail">_</span>
          </h1>
          <div class="topbar-divider" aria-hidden="true"></div>
          <p class="topbar-note">Read your pipeline, contact approvals and saved context without leaving Telegram.</p>
        </div>
      </header>
      <section id="app" class="app-root">
        <section class="state-card state-card-center role-check-card">
          <h1 class="brand-lockup" aria-label="Helly">
            <span class="brand-angle">&gt;</span><span class="brand-word">helly</span><span class="brand-tail">_</span>
          </h1>
          <p class="topbar-note role-check-note">Checking your role and loading the latest recruiting data.</p>
        </section>
      </section>
    </main>
    <script src="/webapp/assets/app.js"></script>
  </body>
  </html>
